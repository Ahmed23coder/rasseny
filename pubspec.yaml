name: rasseny
description: "Rasseny Intelligence — AI-powered news companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  go_router: ^15.1.2
  equatable: ^2.0.7
  flutter_svg: ^2.2.4
  intl_phone_field_v2: ^4.0.5
  font_awesome_flutter: ^10.8.0
  country_picker: ^2.0.27

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/inter/
    - assets/fonts/newsreader/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter.ttf
    - family: Newsreader
      fonts:
        - asset: assets/fonts/newsreader/Newsreader.ttf
